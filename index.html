<script>


fetch("updates.json")


.then(response => response.json())


.then(data => {


let box = document.getElementById("update-box");



data.slice(0,3).forEach(item => {



box.innerHTML += `



<div class="update-card">



<div class="update-date">

${item.date}

</div>




<div>


<h3>

${item.title}

</h3>



<p>

${item.content}

</p>


</div>



</div>



`;



});


})



.catch(error => {


console.log("更新加载失败:", error);


});

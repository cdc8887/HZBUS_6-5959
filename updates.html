<!-- 更新日志 -->


<section class="updates-page">



<div class="section-title">


<h1>
更新日志
</h1>


<p>
记录网站建设以及内容更新过程。
</p>


</div>






<div class="posts-list" id="posts-list">



</div>






</section>








<footer>


© 2026 HZBUS_6-5959


</footer>








<script>


fetch("updates.json")


.then(response => response.json())


.then(data => {



let list = document.getElementById("posts-list");



data.forEach(item => {



list.innerHTML += `



<div class="post-card">



<div class="post-date">

${item.date}

</div>




<h2>

${item.title}

</h2>




<p>

${item.content}

</p>




</div>



`;



});



})



.catch(error => {



console.log("更新日志加载失败:", error);



});



</script>

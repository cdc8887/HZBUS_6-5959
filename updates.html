<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>HZBUS更新日志</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<nav>

<div class="logo">
HZBUS_6-5959
</div>


<div class="menu">

<a href="index.html">首页</a>

<a href="bus.html">公交</a>

<a href="photo.html">日常记录</a>

<a href="travel.html">旅行</a>

<a href="contact.html">联系我</a>

</div>

</nav>



<section class="updates-page">


<h1>
最近更新
</h1>


<div class="update-list">

</div>


</section>



<footer>

© 2026 HZBUS_6-5959

</footer>



<script>

fetch("updates.json")

.then(response => response.json())

.then(data => {


let list = document.querySelector(".update-list");


data.forEach(item => {


list.innerHTML += `


<div class="update-item">


<h2>
${item.title}
</h2>


<p class="date">
${item.date}
</p>


<p>
${item.content}
</p>


</div>


`;


});


})


.catch(error => {

console.log(error);

});


</script>


</body>

</html>
